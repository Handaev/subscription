version: "3"

services:
  postgres-subscription:
    image: 'postgres:15-alpine'
    container_name: 'postgres-subscription'
    ports:
      - 5435:5432
    environment:
      POSTGRES_DB: subscription
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_subscription:/var/lib/postgresql/data
    networks:
      - subscription
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d flow-manager" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  subscription:
    driver: bridge

volumes:
  postgres_subscription: